name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Copy compose file to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "deploy/docker-compose.production.yml"
          target: "~/lago/"
          strip_components: 1

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        env:
          LAGO_DOMAIN: ${{ secrets.LAGO_DOMAIN }}
          LAGO_ACME_EMAIL: ${{ secrets.LAGO_ACME_EMAIL }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          SECRET_KEY_BASE: ${{ secrets.SECRET_KEY_BASE }}
          LAGO_ENCRYPTION_PRIMARY_KEY: ${{ secrets.LAGO_ENCRYPTION_PRIMARY_KEY }}
          LAGO_ENCRYPTION_DETERMINISTIC_KEY: ${{ secrets.LAGO_ENCRYPTION_DETERMINISTIC_KEY }}
          LAGO_ENCRYPTION_KEY_DERIVATION_SALT: ${{ secrets.LAGO_ENCRYPTION_KEY_DERIVATION_SALT }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: LAGO_DOMAIN,LAGO_ACME_EMAIL,POSTGRES_PASSWORD,SECRET_KEY_BASE,LAGO_ENCRYPTION_PRIMARY_KEY,LAGO_ENCRYPTION_DETERMINISTIC_KEY,LAGO_ENCRYPTION_KEY_DERIVATION_SALT
          script: |
            set -e
            cd ~/lago

            # Write .env
            cat > .env << EOF
            LAGO_DOMAIN=${LAGO_DOMAIN}
            LAGO_ACME_EMAIL=${LAGO_ACME_EMAIL}

            POSTGRES_USER=lago
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=lago

            SECRET_KEY_BASE=${SECRET_KEY_BASE}
            LAGO_ENCRYPTION_PRIMARY_KEY=${LAGO_ENCRYPTION_PRIMARY_KEY}
            LAGO_ENCRYPTION_DETERMINISTIC_KEY=${LAGO_ENCRYPTION_DETERMINISTIC_KEY}
            LAGO_ENCRYPTION_KEY_DERIVATION_SALT=${LAGO_ENCRYPTION_KEY_DERIVATION_SALT}

            LAGO_DISABLE_SIGNUP=false
            LAGO_RAILS_STDOUT=true
            EOF

            # Ensure acme.json exists with correct permissions
            mkdir -p letsencrypt
            touch letsencrypt/acme.json
            chmod 600 letsencrypt/acme.json

            # Pull images and deploy
            docker compose -f docker-compose.production.yml --profile all pull
            docker compose -f docker-compose.production.yml --profile all up -d --remove-orphans

            # Show status
            docker compose -f docker-compose.production.yml ps
